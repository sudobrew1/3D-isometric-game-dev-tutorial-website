name: Bug report
description: Something is broken, visually wrong, or behaves unexpectedly
title: "[Bug]"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Which page?
      placeholder: /blender/modeling-the-tiles/
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Phone
        - Tablet

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag an image in if you have one