name: Mobile Bug report
description: Something is broken, visually wrong, or behaves unexpectedly on phones or tablets
title: "[Mobile Bug]"
labels: ["mobile-bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Give a list of steps to reproduce the issue
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Which page?
      placeholder: /blender/modeling-the-tiles/
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Other
        - All Browsers
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Phone
        - Tablet
      validations:
      required: true

  - type: input
    id: mobile-device
    attributes:
      label: What mobile device model?
      placeholder: Google Pixel 7

  - type: textarea
    id: screenshot-or-screen-recording
    attributes:
      label: Screenshot or screen recording
      description: Drag an image or video in if you have one. Videos help a lot for layout and interaction bugs. Supported files -- .mp4, .mov or .webm, under 10MB.